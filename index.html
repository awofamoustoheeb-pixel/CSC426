<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRO — Issues Reporting Outlet</title>
<style>
  :root{
    --clay: #a44a2f;
    --clay-dark: #7d3620;
    --ink: #2b2320;
    --paper: #faf6f0;
    --line: #e4dccf;
    --pending: #b8862b;
    --progress: #3a6ea5;
    --resolved: #3f7d4c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: 'Georgia', 'Iowan Old Style', serif;
    background: var(--paper);
    color: var(--ink);
  }
  header{
    background: var(--ink);
    color: var(--paper);
    padding: 28px 24px 22px;
    text-align:center;
  }
  header h1{
    margin:0; font-size: 1.9rem; letter-spacing:0.5px; font-weight:700;
  }
  header p{
    margin:6px 0 0; font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size:0.85rem; opacity:0.75; letter-spacing:1px; text-transform:uppercase;
  }
  main{
    max-width: 920px; margin: 0 auto; padding: 28px 20px 60px;
  }
  .tabs{
    display:flex; gap:8px; margin-bottom:22px; border-bottom:2px solid var(--line);
  }
  .tab{
    font-family: 'Helvetica Neue', Arial, sans-serif;
    padding:10px 18px; cursor:pointer; font-size:0.9rem; font-weight:600;
    color:#8a7d6f; border-bottom:3px solid transparent; user-select:none;
  }
  .tab.active{ color: var(--clay-dark); border-bottom-color: var(--clay); }
  .panel{ display:none; }
  .panel.active{ display:block; }

  .card{
    background:#fff; border:1px solid var(--line); border-radius:6px;
    padding:22px; margin-bottom:16px;
  }
  label{
    display:block; font-family:'Helvetica Neue', Arial, sans-serif;
    font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;
    color:#8a7d6f; margin:14px 0 6px;
  }
  label:first-of-type{margin-top:0;}
  input, select, textarea{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:4px;
    font-family: 'Helvetica Neue', Arial, sans-serif; font-size:0.95rem; background:var(--paper);
  }
  textarea{ min-height:90px; resize:vertical; }
  .row{ display:flex; gap:14px; }
  .row > div{ flex:1; }
  button{
    font-family:'Helvetica Neue', Arial, sans-serif; font-weight:700; font-size:0.85rem;
    letter-spacing:0.5px; text-transform:uppercase; padding:12px 22px; margin-top:18px;
    background:var(--clay); color:#fff; border:none; border-radius:4px; cursor:pointer;
  }
  button:hover{ background:var(--clay-dark); }
  .checkbox-row{ display:flex; align-items:center; gap:8px; margin-top:14px; }
  .checkbox-row input{ width:auto; }
  .checkbox-row label{ margin:0; text-transform:none; font-weight:400; color:var(--ink); font-size:0.9rem; }

  .issue{
    border:1px solid var(--line); border-radius:6px; padding:16px 18px; margin-bottom:12px; background:#fff;
  }
  .issue-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .issue h3{ margin:0 0 4px; font-size:1.05rem; }
  .meta{ font-family:'Helvetica Neue', Arial, sans-serif; font-size:0.75rem; color:#8a7d6f; }
  .badge{
    font-family:'Helvetica Neue', Arial, sans-serif; font-size:0.7rem; font-weight:700;
    text-transform:uppercase; padding:4px 10px; border-radius:20px; color:#fff; white-space:nowrap;
  }
  .badge.Pending{ background: var(--pending); }
  .badge.In-Progress{ background: var(--progress); }
  .badge.Resolved{ background: var(--resolved); }
  .desc{ margin:10px 0 8px; font-size:0.92rem; line-height:1.4; }
  .status-select{ margin-top:8px; max-width:200px; display:inline-block; }
  .empty{ text-align:center; color:#8a7d6f; padding:40px 0; font-family:'Helvetica Neue', Arial, sans-serif; }
  .filters{ display:flex; gap:10px; margin-bottom:16px; }
  .filters select{ max-width:220px; }
</style>
</head>
<body>

<header>
  <h1>IRO — Issues Reporting Outlet</h1>
  <p>For AAUA Students &amp; Akungba · Iwaro · Etioro · Ayegunle Indigenes</p>
</header>

<main>
  <div class="tabs">
    <div class="tab active" data-tab="report">Report an Issue</div>
    <div class="tab" data-tab="feed">Community Feed</div>
  </div>

  <!-- REPORT PANEL -->
  <div class="panel active" id="panel-report">
    <div class="card">
      <label>Reporter Type</label>
      <select id="reporterType">
        <option>Student</option>
        <option>Indigene</option>
      </select>

      <div class="row">
        <div>
          <label>Community / Location</label>
          <select id="community">
            <option>AAUA Campus</option>
            <option>Akungba-Akoko</option>
            <option>Iwaro-Akoko</option>
            <option>Etioro-Akoko</option>
            <option>Ayegunle-Akoko</option>
          </select>
        </div>
        <div>
          <label>Category</label>
          <select id="category">
            <option>Security/Safety</option>
            <option>Electricity/Power</option>
            <option>Water Supply</option>
            <option>Road/Infrastructure</option>
            <option>Sanitation</option>
            <option>Harassment/Welfare</option>
            <option>Accommodation Dispute</option>
            <option>Health/Medical</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <label>Issue Title</label>
      <input type="text" id="title" placeholder="e.g. Broken streetlight along hostel road">

      <label>Description</label>
      <textarea id="description" placeholder="Describe the issue in detail..."></textarea>

      <div class="checkbox-row">
        <input type="checkbox" id="anonymous">
        <label for="anonymous">Report anonymously</label>
      </div>

      <button onclick="submitIssue()">Submit Report</button>
    </div>
  </div>

  <!-- FEED PANEL -->
  <div class="panel" id="panel-feed">
    <div class="filters">
      <select id="filterCategory" onchange="renderFeed()">
        <option value="">All Categories</option>
      </select>
      <select id="filterStatus" onchange="renderFeed()">
        <option value="">All Statuses</option>
        <option>Pending</option>
        <option>In-Progress</option>
        <option>Resolved</option>
      </select>
    </div>
    <div id="feedList"></div>
  </div>
</main>

<script>
// In-memory store simulating the backend (a real deployment would call a REST API / database)
let issues = [
  {id:1, title:"Frequent power outages near Iwaro junction", category:"Electricity/Power",
   community:"Iwaro-Akoko", desc:"Power has been out for 5 days affecting small businesses.",
   reporter:"Indigene", anonymous:false, status:"Pending", date:"2026-01-03"},
  {id:2, title:"Unsafe pathway behind female hostel", category:"Security/Safety",
   community:"AAUA Campus", desc:"No lighting at night, students feel unsafe walking back from lectures.",
   reporter:"Student", anonymous:true, status:"In-Progress", date:"2026-01-05"},
  {id:3, title:"Blocked drainage causing flooding", category:"Sanitation",
   community:"Akungba-Akoko", desc:"Drainage near the market has been blocked for weeks.",
   reporter:"Indigene", anonymous:false, status:"Resolved", date:"2025-12-20"}
];
let nextId = 4;

const categories = ["Security/Safety","Electricity/Power","Water Supply","Road/Infrastructure",
  "Sanitation","Harassment/Welfare","Accommodation Dispute","Health/Medical","Other"];
const filterCat = document.getElementById('filterCategory');
categories.forEach(c => { const o=document.createElement('option'); o.textContent=c; filterCat.appendChild(o); });

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.tab).classList.add('active');
    if(tab.dataset.tab==='feed') renderFeed();
  });
});

function submitIssue(){
  const title = document.getElementById('title').value.trim();
  const desc = document.getElementById('description').value.trim();
  if(!title || !desc){ alert('Please fill in both the title and description.'); return; }

  issues.unshift({
    id: nextId++,
    title,
    category: document.getElementById('category').value,
    community: document.getElementById('community').value,
    desc,
    reporter: document.getElementById('reporterType').value,
    anonymous: document.getElementById('anonymous').checked,
    status: "Pending",
    date: new Date().toISOString().slice(0,10)
  });

  document.getElementById('title').value='';
  document.getElementById('description').value='';
  document.getElementById('anonymous').checked=false;

  document.querySelector('.tab[data-tab="feed"]').click();
}

function renderFeed(){
  const list = document.getElementById('feedList');
  const catF = document.getElementById('filterCategory').value;
  const statF = document.getElementById('filterStatus').value;
  const filtered = issues.filter(i => (!catF || i.category===catF) && (!statF || i.status===statF));

  if(filtered.length===0){
    list.innerHTML = '<div class="empty">No issues match these filters yet.</div>';
    return;
  }

  list.innerHTML = filtered.map(i => `
    <div class="issue">
      <div class="issue-top">
        <div>
          <h3>${escapeHtml(i.title)}</h3>
          <div class="meta">${i.category} · ${i.community} · Reported by ${i.anonymous ? 'Anonymous' : i.reporter} · ${i.date}</div>
        </div>
        <span class="badge ${i.status}">${i.status}</span>
      </div>
      <div class="desc">${escapeHtml(i.desc)}</div>
      <select class="status-select" onchange="updateStatus(${i.id}, this.value)">
        <option ${i.status==='Pending'?'selected':''}>Pending</option>
        <option ${i.status==='In-Progress'?'selected':''}>In-Progress</option>
        <option ${i.status==='Resolved'?'selected':''}>Resolved</option>
      </select>
    </div>
  `).join('');
}

function updateStatus(id, newStatus){
  const issue = issues.find(i=>i.id===id);
  if(issue) issue.status = newStatus;
  renderFeed();
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

renderFeed();
</script>
</body>
</html>
